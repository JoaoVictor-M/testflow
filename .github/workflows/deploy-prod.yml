name: Master Deploy Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

env:
  # Registry and Repo formatting to lowercase as Docker requires
  REGISTRY: ghcr.io
  IMAGE_OWNER: ""
  IMAGE_TAG: ""

jobs:
  # 1. Dependency Scanning (SCA)
  dependency-scan:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit Backend Dependencies
        working-directory: ./testflow-app
        run: npm audit || echo "Audit Backend completed with warnings"

      - name: Audit Frontend Dependencies
        working-directory: ./testflow-frontend
        run: npm audit || echo "Audit Frontend completed with warnings"

  # 2. Static Application Security Testing (SAST)
  sast-eslint:
    name: SAST - ESLint Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./testflow-app
        run: npm ci

      - name: Run ESLint Security Check
        working-directory: ./testflow-app
        run: npm run lint

  # 3. Dynamic Application Security Testing (DAST)
  dast-zap:
    name: DAST - Sec & ZAP Scan
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-eslint]
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env for testing
        run: |
          echo "MONGO_URI=mongodb://mongodb-service:27017/testflow" >> ./testflow-app/.env
          echo "JWT_SECRET=supersecret_test_key" >> ./testflow-app/.env
          echo "PORT=3000" >> ./testflow-app/.env

      - name: Build Backend Image for Scanning
        run: docker build -t testflow-backend:latest ./testflow-app

      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'testflow-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Build and Start Application
        run: |
          echo "services:" > docker-compose.ci.yml
          echo "  backend-service:" >> docker-compose.ci.yml
          echo "    ports:" >> docker-compose.ci.yml
          echo "      - \"3000:3000\"" >> docker-compose.ci.yml
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for Application to be Ready
        run: |
          echo "Waiting for Application..."
          timeout 60 bash -c 'while ! curl -s http://localhost:3000 > /dev/null; do sleep 5; done' || (docker logs backend_testflow && exit 1)
          echo "Backend is responding!"

      - name: Run ZAP Full Scan (Active Attack)
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --add-host=host.docker.internal:host-gateway \
            -v $(pwd)/zap-work:/zap/wrk:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py -t http://host.docker.internal:3000 -r report_html.html || echo "ZAP Scan completed"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ZAP-Security-Report
          path: zap-work/report_html.html

  # 4. Build and Push Images to GHCR
  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [dast-zap]
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup downcases
        run: |
          echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}
          TAG=${GITHUB_REF#refs/tags/}
          echo "IMAGE_TAG=${TAG}" >> ${GITHUB_ENV}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./testflow-app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-backend:${{ env.IMAGE_TAG }}

      # Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./testflow-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-frontend:${{ env.IMAGE_TAG }}

      # Nginx
      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-nginx:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-nginx:${{ env.IMAGE_TAG }}

  # 5. Update Prod Config Repository
  update-prod-repo:
    name: Deploy to Prod Repository
    runs-on: ubuntu-latest
    needs: [build-and-push-images]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: source

      - name: Setup downcases
        run: |
          echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Checkout Prod Repository
        uses: actions/checkout@v4
        with:
          repository: JoaoVictor-M/testflow-prod
          token: ${{ secrets.PROD_REPO_TOKEN }}
          path: prod

      - name: Format Prod Files
        run: |
          # 1. Limpeza Profunda: Remove absolutamente todos os arquivos da árvore do git na branch destino
          cd prod
          git rm -rf . || true
          cd ..
          
          # 2. Recria os diretórios e copia cirurgicamente APENAS o necessário
          cp source/install/mongo-init.js prod/mongo-init.js || echo "O arquivo mongo-init.js não foi encontrado"
          cp source/README.md prod/README.md || echo "O README.md não foi encontrado"
          
          # 2.1 Remove a seção de 'Desenvolvimento' inteira do README.md de produção usando sed delimitado
          sed -i '/## 🛠️ Desenvolvimento (Para Code Maintainers)/,/^---$/d' prod/README.md

          echo '{"version": "${{ github.ref_name }}"}' > prod/version.json
          
          # O arquivo Compose é copiado do seu código local e depois lapidado dinamicamente
          cp source/docker-compose.yml prod/docker-compose.yml

          # 3. Lapidação do docker-compose para Produção
          # Troca os builds pelas imagens na nuvem
          sed -i "s|build: ./testflow-app|image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-backend:latest|g" prod/docker-compose.yml
          sed -i "s|build: ./testflow-frontend|image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-frontend:latest|g" prod/docker-compose.yml
          sed -i "s|build: ./nginx|image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-nginx:latest|g" prod/docker-compose.yml
          
          # Atualiza a rota de volume do mongo-init.js de "./install/..." para root "./mongo-init.js"
          sed -i "s|./install/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro|./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro|g" prod/docker-compose.yml
          
          # Remove completamente a seção ports do mongodb em produção usando parser real de YAML do Python (Mais nativo e seguro que sed/yq)
          python3 -c "import yaml; 
          with open('prod/docker-compose.yml', 'r') as f: doc = yaml.safe_load(f);
          if 'ports' in doc['services']['mongodb-service']: del doc['services']['mongodb-service']['ports'];
          for s in doc['services'].values():
            if 'container_name' in s: del s['container_name'];
          with open('prod/docker-compose.yml', 'w') as f: yaml.dump(doc, f, sort_keys=False, default_flow_style=False)"

          # Remove o fallback da senha do Watchtower para evitar o uso de credenciais engessadas publicamente
          sed -i 's|:-uma-senha-padrao-super-segura-e-exclusiva-para-webhook||g' prod/docker-compose.yml

      - name: Push release files to Github Prod
        run: |
          cd prod
          git config user.name "GitHub Actions Deploy"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: release components and infra matching version ${{ github.ref_name }}" || echo "No changes"
          git push origin main
