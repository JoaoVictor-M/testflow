services:
  mongodb-service:
    image: mongo:latest
    container_name: mongodb_testflow
    restart: always

    ports:
      # dev-only-mongo-port
      # dev-only-mongo-port
      - "27017:27017"

    volumes:
      - mongo-data:/data/db
      - ./install/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  backend-service:
    build: ./testflow-app
    container_name: backend_testflow
    restart: always
    expose:
      - "3000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-https://localhost/testflow}
    volumes:
      - ./evidencias_testes:/evidencias_testes
    depends_on:
      - mongodb-service

  frontend-service:
    build: ./testflow-frontend
    container_name: frontend_testflow
    restart: always
    expose:
      - "80"
    depends_on:
      - backend-service

  nginx-service:
    build: ./nginx
    container_name: nginx_testflow
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend-service
      - backend-service
    volumes:
      - ./certificados:/etc/nginx/ssl:ro

  watchtower-service:
    image: containrrr/watchtower
    container_name: watchtower_testflow
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:-uma-senha-padrao-super-segura-e-exclusiva-para-webhook}
      - WATCHTOWER_CLEANUP=true

volumes:
  mongo-data:
