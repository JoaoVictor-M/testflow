name: Tag Release Pipeline (Securiy + GHCR + Prod Deploy)

on:
  push:
    tags:
      - 'v*.*.*' # Aciona pipeline apenas p/ pushes de tags como v1.0.0

env:
  PROD_REPO: "JoaoVictor-M/testflow-prod"
  # O GHCR sera salvo na propria conta do organizador do repo
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ----------------------------------------------------------------------
  # 1. Dependency Scanning (SCA)
  # ----------------------------------------------------------------------
  dependency-scan:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit Backend Dependencies
        working-directory: ./testflow-app
        run: npm audit

      - name: Audit Frontend Dependencies
        working-directory: ./testflow-frontend
        run: npm audit

  # ----------------------------------------------------------------------
  # 2. Static Application Security Testing (SAST)
  # ----------------------------------------------------------------------
  sast-eslint:
    name: SAST - ESLint Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./testflow-app
        run: npm ci

      - name: Run ESLint Security Check
        working-directory: ./testflow-app
        run: npm run lint

  # ----------------------------------------------------------------------
  # 3. Dynamic Application Security Testing (DAST)
  # ----------------------------------------------------------------------
  dast-zap:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-eslint] # Roda apenas se Lint/SCA passarem
    permissions:
      contents: read 
      issues: write 
      checks: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env for testing
        run: |
          echo "MONGO_URI=mongodb://mongodb-service:27017/testflow" >> ./testflow-app/.env
          echo "JWT_SECRET=supersecret_test_key" >> ./testflow-app/.env
          echo "PORT=3000" >> ./testflow-app/.env
          echo "FRONTEND_URL=http://localhost:80" >> ./testflow-app/.env

      - name: Build Backend Image for Scanning
        run: docker build -t testflow-backend:latest ./testflow-app

      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'testflow-backend:latest'
          format: 'table'
          exit-code: '1' # Falhar build em caso de Vulnerabilidade
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL' # Ajustado para High+, para evitar bloqueios irreais

      - name: Build and Start Application
        # Para testar DAST preparamos todo o ambiente, NGINX inclusive
        run: docker compose up -d --build

      - name: Wait for Application to be Ready
        run: |
          echo "Waiting for Application..."
          timeout 60 bash -c 'while ! curl -s http://localhost:3000 > /dev/null; do sleep 5; done' || (docker logs backend_testflow && exit 1)
          echo "Backend is responding!"

      - name: Run ZAP Full Scan (Active Attack)
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          docker pull ghcr.io/zaproxy/zaproxy:stable
          
          docker run --add-host=host.docker.internal:host-gateway \
            -v $(pwd)/zap-work:/zap/wrk:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py -t http://host.docker.internal:3000 -r report_html.html

      - name: Upload ZAP Report
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: ZAP-Security-Report
          path: zap-work/report_html.html


  # ----------------------------------------------------------------------
  # 4. Build and Push Images to GHCR
  # ----------------------------------------------------------------------
  build-and-push-images:
    name: Build & Push to GHCR
    needs: dast-zap # ** ESSENCIAL: Só inicia compilacao e publicacao se ZAP passou limpo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Branch / Tag metadata (Set Tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-backend
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-frontend
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-nginx
          tags: |
            # Semantiza a Tag (vira v1.0.0 a depender do push) e atacha na rule `latest` tmb
            type=ref,event=tag
            type=raw,value=latest

      - name: Log in to GitHub Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BACKEND
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./testflow-app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-backend:${{ github.ref_name }}

      # FRONTEND
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./testflow-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-frontend:${{ github.ref_name }}

      # NGINX
      - name: Build and push Nginx Image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-nginx:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/testflow-nginx:${{ github.ref_name }}


  # ----------------------------------------------------------------------
  # 5. Publicate Install Configs to Remote 'testflow-prod'
  # ----------------------------------------------------------------------
  update-prod-repo:
    name: Dispatch testflow-prod
    needs: build-and-push-images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo (Master / Local)
        uses: actions/checkout@v4
        with:
          path: 'source-repo'

      - name: Checkout Prod Repo (Remote Installation Repository)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROD_REPO }}
          token: ${{ secrets.PROD_REPO_TOKEN }} # *REQUERIDO: Configurar Token no Origem*
          path: 'prod-repo'

      - name: Copy install files to Prod Repo
        run: |
          cd prod-repo
          # Limpa todos os arquivos rastreados atuais antes de jogar a versao mestre (mantendo .git)
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' -exec rm -rf {} +
          cd ..
          
          # Copia fisicamente tudo de source-repo/install -> prod-repo/
          cp -R source-repo/install/* prod-repo/

      - name: Commit and Push changes
        run: |
          cd prod-repo
          git config --global user.name 'testflow-ci-bot'
          git config --global user.email 'testflow-ci-bot@users.noreply.github.com'
          
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração detectada nos arquivos de infraestrutura (docker-compose, configs, etc.)."
          else
            git commit -m "chore: atualizacao da arvore de producao com base na tag oficial ${{ github.ref_name }}"
            git push origin main
          fi
